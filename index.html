<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Birthday Countdown 🎀</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --rose:   #f4a7b9;
    --blush:  #fce4ec;
    --orchid: #ce93d8;
    --lavender: #e8d5f5;
    --deep:   #7b1fa2;
    --pink-deep: #c2185b;
    --cream:  #fff8f9;
    --glass:  rgba(255,255,255,0.52);
    --glass-border: rgba(255,255,255,0.75);
  }

  html, body {
    min-height: 100%;
    overflow-x: hidden;
  }

  body {
    font-family: 'Jost', sans-serif;
    background: #fceef5;
    cursor: none;
  }

  /* ── custom cursor ── */
  #cursor {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: radial-gradient(circle, #f4a7b9, #ce93d8);
    position: fixed; top: 0; left: 0;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.1s ease, width 0.2s, height 0.2s;
    mix-blend-mode: multiply;
  }

  /* ── animated gradient bg ── */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 20%, #ffeeff 45%, #e8d5f5 70%, #d4b8f0 100%);
    background-size: 400% 400%;
    animation: bgShift 12s ease-in-out infinite alternate;
  }

  @keyframes bgShift {
    0%   { background-position: 0% 50%; }
    100% { background-position: 100% 50%; }
  }

  /* ── floating petals canvas ── */
  #canvas { position: fixed; inset: 0; z-index: 1; pointer-events: none; }

  /* ── main content ── */
  .page {
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 3rem 1.5rem;
    gap: 2rem;
  }

  /* ── top ribbon ── */
  .ribbon {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 0.78rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--pink-deep);
    opacity: 0.65;
    animation: fadeUp 1s ease 0.2s both;
  }

  /* ── hero title ── */
  .hero {
    text-align: center;
    animation: fadeUp 1s ease 0.4s both;
  }

  .hero h1 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: clamp(3rem, 9vw, 6.5rem);
    line-height: 1.05;
    background: linear-gradient(135deg, #c2185b 0%, #7b1fa2 40%, #e91e8c 70%, #9c27b0 100%);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite;
  }

  @keyframes shimmer {
    0%   { background-position: 0% center; }
    100% { background-position: 200% center; }
  }

  .hero .date-badge {
    display: inline-block;
    margin-top: 0.8rem;
    background: var(--glass);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(10px);
    border-radius: 50px;
    padding: 0.45rem 1.4rem;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 0.85rem;
    letter-spacing: 0.18em;
    color: var(--deep);
  }

  /* ── countdown card ── */
  .card {
    background: var(--glass);
    border: 1.5px solid var(--glass-border);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border-radius: 32px;
    padding: 3rem 2.5rem 2.5rem;
    max-width: 680px;
    width: 100%;
    animation: fadeUp 1s ease 0.6s both, glowPulse 4s ease-in-out 2s infinite;
    text-align: center;
  }

  @keyframes glowPulse {
    0%, 100% { box-shadow: 0 8px 60px rgba(206,147,216,0.2), 0 0 0 rgba(244,167,185,0); }
    50%       { box-shadow: 0 12px 80px rgba(206,147,216,0.38), 0 0 40px rgba(244,167,185,0.15); }
  }

  /* ── units row ── */
  .units {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
    flex-wrap: wrap;
  }

  .unit {
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
  }

  .num-box {
    width: 110px; height: 110px;
    background: linear-gradient(145deg, rgba(255,255,255,0.7), rgba(248,187,208,0.35));
    border: 1.5px solid rgba(255,255,255,0.8);
    border-radius: 22px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 3.2rem;
    color: var(--deep);
    position: relative;
    overflow: hidden;
    transition: transform 0.12s ease;
  }

  .num-box::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(255,255,255,0.45) 0%, transparent 55%);
    border-radius: inherit;
    pointer-events: none;
  }

  .num-box.flip {
    animation: flipBounce 0.28s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes flipBounce {
    0%   { transform: scaleY(0.6) scaleX(0.95); }
    60%  { transform: scaleY(1.06) scaleX(0.98); }
    100% { transform: scaleY(1) scaleX(1); }
  }

  .unit-label {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--pink-deep);
    opacity: 0.7;
  }

  .sep {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 2.2rem;
    color: var(--orchid);
    opacity: 0.6;
    margin-bottom: 1.8rem;
    animation: sepBlink 2s ease-in-out infinite;
  }

  @keyframes sepBlink {
    0%, 100% { opacity: 0.6; }
    50%       { opacity: 0.2; }
  }

  /* ── sparkle dots ── */
  .sparkles {
    display: flex; justify-content: center; gap: 8px;
    margin-top: 2rem;
  }

  .sp {
    width: 7px; height: 7px;
    border-radius: 50%;
    animation: twinkle 1.8s ease-in-out infinite;
  }

  .sp:nth-child(1) { background: var(--rose); animation-delay: 0s; }
  .sp:nth-child(2) { background: var(--orchid); animation-delay: 0.3s; width:9px;height:9px; }
  .sp:nth-child(3) { background: var(--rose); animation-delay: 0.6s; }
  .sp:nth-child(4) { background: var(--orchid); animation-delay: 0.9s; width:6px;height:6px; }
  .sp:nth-child(5) { background: #f8bbd0; animation-delay: 1.2s; }
  .sp:nth-child(6) { background: var(--orchid); animation-delay: 1.5s; width:9px;height:9px; }
  .sp:nth-child(7) { background: var(--rose); animation-delay: 1.8s; }

  @keyframes twinkle {
    0%, 100% { opacity: 0.25; transform: scale(0.8); }
    50%       { opacity: 1;    transform: scale(1.3); }
  }

  /* ── tagline ── */
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.15rem;
    color: var(--pink-deep);
    opacity: 0.65;
    margin-top: 1.6rem;
    animation: float 5s ease-in-out infinite;
  }

  /* ── progress bar ── */
  .progress-wrap {
    margin-top: 2rem;
    background: rgba(255,255,255,0.4);
    border-radius: 50px;
    height: 6px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.6);
  }

  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #f48fb1, #ce93d8, #f48fb1);
    background-size: 200%;
    border-radius: 50px;
    animation: shimmer 2s linear infinite;
    transition: width 1s ease;
  }

  /* ── birthday msg (hidden until zero) ── */
  #bday-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    animation: fadeUp 1s ease;
  }

  #bday-screen h2 {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 600;
    font-size: clamp(2.5rem, 8vw, 5rem);
    background: linear-gradient(135deg, #c2185b, #9c27b0, #e91e8c);
    background-size: 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 2s linear infinite;
    text-align: center;
  }

  #bday-screen p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.3rem;
    color: var(--deep);
    opacity: 0.75;
    text-align: center;
  }

  /* ── bottom quote ── */
  .quote {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--pink-deep);
    opacity: 0.5;
    text-align: center;
    animation: fadeUp 1s ease 0.8s both;
    max-width: 380px;
  }

  /* ── floating hearts deco ── */
  .hearts {
    position: fixed; inset: 0; pointer-events: none; z-index: 1;
  }

  .heart {
    position: absolute;
    opacity: 0.12;
    font-size: 1.6rem;
    animation: float linear infinite;
  }

  @keyframes float {
    0%   { transform: translateY(0) rotate(-5deg); }
    50%  { transform: translateY(-20px) rotate(5deg); }
    100% { transform: translateY(0) rotate(-5deg); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── confetti ── */
  .confetti-piece {
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    animation: confettiFall linear forwards;
    border-radius: 2px;
  }

  @keyframes confettiFall {
    0%   { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(105vh) rotate(1080deg); opacity: 0; }
  }

  /* ── responsive ── */
  @media (max-width: 520px) {
    .num-box { width: 72px; height: 72px; font-size: 2.2rem; border-radius: 16px; }
    .sep { font-size: 1.5rem; }
    .card { padding: 2rem 1.2rem 1.8rem; border-radius: 24px; }
  }
</style>
</head>
<body>

<div id="cursor"></div>
<div class="bg"></div>
<canvas id="canvas"></canvas>

<!-- floating hearts deco -->
<div class="hearts" id="hearts"></div>

<div class="page">
  <div class="ribbon">✦ &nbsp; a little something for you &nbsp; ✦</div>

  <div class="hero">
    <h1>Her Birthday</h1>
    <span class="date-badge">22 March · Midnight</span>
  </div>

  <!-- countdown card -->
  <div class="card" id="countdown-card">
    <div class="units" id="units">
      <div class="unit">
        <div class="num-box" id="days">00</div>
        <div class="unit-label">Days</div>
      </div>
      <div class="sep">·</div>
      <div class="unit">
        <div class="num-box" id="hours">00</div>
        <div class="unit-label">Hours</div>
      </div>
      <div class="sep">·</div>
      <div class="unit">
        <div class="num-box" id="mins">00</div>
        <div class="unit-label">Minutes</div>
      </div>
      <div class="sep">·</div>
      <div class="unit">
        <div class="num-box" id="secs">00</div>
        <div class="unit-label">Seconds</div>
      </div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>

    <div class="sparkles">
      <div class="sp"></div><div class="sp"></div><div class="sp"></div>
      <div class="sp"></div><div class="sp"></div><div class="sp"></div><div class="sp"></div>
    </div>

    <div class="tagline" id="tagline">Something magical is coming… 🎀</div>

    <!-- birthday screen -->
    <div id="bday-screen">
      <h2>Happy Birthday! 🎂</h2>
      <p>Wishing you all the love, sparkle &amp; joy today 🌸</p>
    </div>
  </div>

  <div class="quote">"She leaves a little sparkle wherever she goes."</div>
</div>

<script>
  /* ── cursor ── */
  const cur = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cur.style.left = e.clientX + 'px';
    cur.style.top  = e.clientY + 'px';
  });

  /* ── floating hearts ── */
  const heartsEl = document.getElementById('hearts');
  const heartChars = ['🌸','✨','💕','🎀','🌷','💫','🩷'];
  for (let i = 0; i < 14; i++) {
    const h = document.createElement('span');
    h.className = 'heart';
    h.textContent = heartChars[i % heartChars.length];
    h.style.left   = (Math.random() * 95) + '%';
    h.style.top    = (Math.random() * 90) + '%';
    h.style.animationDuration = (5 + Math.random() * 6) + 's';
    h.style.animationDelay   = (Math.random() * 5) + 's';
    h.style.fontSize = (1 + Math.random() * 1.4) + 'rem';
    heartsEl.appendChild(h);
  }

  /* ── petal canvas ── */
  const canvas = document.getElementById('canvas');
  const ctx    = canvas.getContext('2d');
  const petals = [];
  const PETAL_COLORS = ['#f48fb1','#ce93d8','#f8bbd0','#e1bee7','#fff'];

  function resizeCanvas() {
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  for (let i = 0; i < 22; i++) {
    petals.push({
      x: Math.random() * window.innerWidth,
      y: Math.random() * window.innerHeight,
      r: 6 + Math.random() * 7,
      speed: 0.5 + Math.random() * 1.2,
      drift: (Math.random() - 0.5) * 0.8,
      rot: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.04,
      color: PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)],
      alpha: 0.25 + Math.random() * 0.3
    });
  }

  function drawPetal(p) {
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.ellipse(0, 0, p.r, p.r * 1.6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function animPetals() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    petals.forEach(p => {
      p.y += p.speed;
      p.x += p.drift;
      p.rot += p.rotSpeed;
      if (p.y > canvas.height + 20) {
        p.y = -20;
        p.x = Math.random() * canvas.width;
      }
      drawPetal(p);
    });
    requestAnimationFrame(animPetals);
  }
  animPetals();

  /* ── countdown ── */
  const TARGET = new Date('2026-03-22T23:59:59');
  // total duration: from today
  const START_TIME = new Date();

  const els = {
    days:  document.getElementById('days'),
    hours: document.getElementById('hours'),
    mins:  document.getElementById('mins'),
    secs:  document.getElementById('secs'),
  };
  const prev = { days:'', hours:'', mins:'', secs:'' };
  const tagline  = document.getElementById('tagline');
  const progressBar = document.getElementById('progress-bar');
  const units    = document.getElementById('units');
  const bdayScreen = document.getElementById('bday-screen');

  function pad(n) { return String(n).padStart(2,'0'); }

  function setNum(id, val) {
    const s = pad(val);
    if (prev[id] !== s) {
      els[id].textContent = s;
      els[id].classList.remove('flip');
      void els[id].offsetWidth;
      els[id].classList.add('flip');
      prev[id] = s;
    }
  }

  function tick() {
    const now  = new Date();
    const diff = TARGET - now;

    if (diff <= 0) {
      units.style.display = 'none';
      tagline.style.display = 'none';
      document.querySelector('.progress-wrap').style.display = 'none';
      document.querySelector('.sparkles').style.display = 'none';
      bdayScreen.style.display = 'flex';
      launchConfetti();
      return;
    }

    const total = Math.floor(diff / 1000);
    setNum('days',  Math.floor(total / 86400));
    setNum('hours', Math.floor((total % 86400) / 3600));
    setNum('mins',  Math.floor((total % 3600) / 60));
    setNum('secs',  total % 60);

    // progress
    const elapsed = now - START_TIME;
    const span    = TARGET - START_TIME;
    const pct     = Math.min(100, Math.max(0, (elapsed / span) * 100));
    progressBar.style.width = pct.toFixed(2) + '%';

    // tagline
    const days = Math.floor(total / 86400);
    if (days === 0 && Math.floor((total % 3600) / 60) < 60) {
      tagline.textContent = '✨ Almost time to celebrate! ✨';
    } else if (days <= 3) {
      tagline.textContent = '🌸 The magic is almost here… 🎀';
    } else if (days <= 7) {
      tagline.textContent = 'One beautiful week away 🌷';
    } else {
      tagline.textContent = 'Something magical is coming… 🎀';
    }

    setTimeout(tick, 1000);
  }
  tick();

  /* ── confetti ── */
  function launchConfetti() {
    const colors = ['#f48fb1','#ce93d8','#ffffff','#f8bbd0','#e1bee7','#ffd700','#ffb3c6'];
    for (let i = 0; i < 120; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        const size = 8 + Math.random() * 8;
        el.style.cssText = `
          left: ${Math.random()*100}vw;
          top: -10px;
          width: ${size}px;
          height: ${size}px;
          background: ${colors[Math.floor(Math.random()*colors.length)]};
          animation-duration: ${2.5 + Math.random()*2.5}s;
          animation-delay: ${Math.random()*2}s;
          ${Math.random()>0.5 ? 'border-radius:50%;' : ''}
        `;
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 6000);
      }, i * 30);
    }
  }
</script>
</body>
</html>
